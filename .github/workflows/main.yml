name: Cloudflare Gateway Sync

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          PRIMARY_EMAIL: ${{ secrets.PRIMARY_EMAIL }}
          SECONDARY_EMAIL: ${{ secrets.SECONDARY_EMAIL }}
          TERTIARY_EMAIL: ${{ secrets.TERTIARY_EMAIL }}
          ACTIVE_TIER: ${{ vars.ACTIVE_TIER }}
        run: python3 block_ads_sync.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add aggregate_blocklist.txt
          if git diff --cached --quiet; then
            echo "No changes detected in aggregate_blocklist.txt. Skipping commit."
          else
            git commit -m "chore: automated blocklist matrix sync [skip ci]"
            git push
          fi
