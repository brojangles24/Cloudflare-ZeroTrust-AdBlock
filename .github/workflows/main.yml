name: Cloudflare Gateway Sync

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
        # Make sure this filename perfectly matches your repo!
        run: python3 block_ads_sync.py 

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Only adding the text file since stats were removed
          git add aggregate_blocklist.txt 
          if ! git diff --cached --quiet; then
            git commit -m "Full Intelligence Update [skip ci]"
            git push
          fi
